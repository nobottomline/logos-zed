name = "Logos"
grammar = "logos"
path_suffixes = ["x", "xm", "xi", "xmi"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
tab_size = 4
hard_tabs = false
word_characters = ["_", "$", "%"]
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
    { start = "/*", end = "*/", close = true, newline = false, not_in = ["string", "comment"] },
]
